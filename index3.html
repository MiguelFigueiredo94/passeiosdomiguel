<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arquivo de Memórias - Passeios do Miguel</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/css/glightbox.min.css">
    
    <style>
        :root {
            --museum-wall: #e8e8e8;
            --plate-dark: #1a1a1a;
            --plate-gray: #333333;
            --accent: #ff8c00;
            --text-light: #f4f4f4;
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; 
            background-color: var(--museum-wall); 
            min-height: 100vh; 
            display: flex;
        }

        /* --- SINALÉTICA FORMAL (MENU LATERAL) --- */
        .museum-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 240px;
            height: 100vh;
            background: linear-gradient(180deg, #222 0%, #111 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            z-index: 1000;
            box-shadow: 5px 0 25px rgba(0,0,0,0.2);
        }

        .nav-plate {
            width: 180px;
            background: var(--plate-gray);
            border-left: 4px solid var(--accent);
            margin-bottom: 15px;
            padding: 15px;
            text-decoration: none;
            color: var(--text-light);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .nav-plate:hover {
            background: var(--plate-dark);
            transform: translateX(10px);
            border-left-width: 8px;
        }

        .nav-plate i { margin-right: 10px; color: var(--accent); }

        /* --- CONTEÚDO PRINCIPAL --- */
        main { 
            flex-grow: 1;
            margin-left: 240px;
            display: flex;
            flex-direction: column;
        }

        /* BANNER DE EXPOSIÇÃO */
        .exhibition-header {
            height: 350px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1518998053901-5348d3961a04?q=80&w=1974&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            border-bottom: 5px solid var(--plate-dark);
        }

        .exhibition-header h1 { 
            font-size: 3rem; font-weight: 200; letter-spacing: 8px; margin: 0; 
            text-transform: uppercase;
        }

        /* FILTROS (CHAPAS METÁLICAS) */
        .museum-filters {
            background: #dbdbdb;
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 900;
            border-bottom: 1px solid #ccc;
        }

        .filter-plate {
            background: var(--plate-dark);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .filter-plate:hover { background: var(--accent); }
        .filter-plate.active { background: var(--accent); position: relative; }

        /* GRELHA DE OBRAS (PASSEIOS) */
        .gallery-room {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 60px;
            padding: 60px 8%;
            perspective: 1500px;
        }

        .year-divider {
            grid-column: 1 / -1;
            font-size: 2.5rem;
            font-weight: 200;
            color: #444;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* A MOLDURA PROFISSIONAL */
        .art-frame {
            background: white;
            padding: 20px;
            box-shadow: 20px 30px 50px rgba(0,0,0,0.15);
            transition: 0.1s ease-out;
            border: 1px solid #ddd;
            position: relative;
            cursor: pointer;
        }

        .art-frame img { 
            width: 100%; 
            height: 300px; 
            object-fit: cover; 
            filter: grayscale(20%);
            transition: 0.5s;
        }
        .art-frame:hover img { filter: grayscale(0%); }

        /* ETIQUETA DA OBRA */
        .art-label {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-left: 3px solid var(--plate-dark);
        }

        .art-label h3 { 
            margin: 0; font-size: 1rem; color: #111; 
            text-transform: uppercase; letter-spacing: 1px;
        }

        .art-label p { margin: 5px 0 0; font-size: 0.8rem; color: #777; font-style: italic; }

        .counter-tag {
            position: absolute;
            top: 30px;
            right: 30px;
            background: var(--accent);
            color: white;
            padding: 5px 12px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 5;
        }

        @media (max-width: 1024px) {
            body { flex-direction: column; }
            .museum-nav { 
                width: 100%; height: auto; position: relative; 
                flex-direction: row; overflow-x: auto; padding: 15px;
            }
            .nav-plate { min-width: 160px; margin: 0 10px; }
            main { margin-left: 0; }
        }
    </style>
</head>
<body>

    <nav class="museum-nav">
        <div style="color:var(--accent); margin-bottom: 30px; font-weight: 800; letter-spacing: 2px;">PASSEIOS DO MIGUEL</div>
        
        <a href="index.html" class="nav-plate">
            <i class="fas fa-home"></i> Início
        </a>
        <a href="passeios.html" class="nav-plate">
            <i class="fas fa-map-marked-alt"></i> Passeios
        </a>
        <a href="contactos.html" class="nav-plate">
            <i class="fas fa-envelope"></i> Contactos
        </a>
    </nav>

    <main>
        <header class="exhibition-header">
            <h1>Arquivo de Memórias</h1>
            <p style="letter-spacing: 3px; font-weight: 300;">CURADORIA DIGITAL 2025-2026</p>
        </header>

        <nav class="museum-filters">
            <button class="filter-plate" data-filter="all" onclick="filterGallery('all')">Coleção Completa</button>
            <button class="filter-plate" data-filter="2026" onclick="filterGallery('2026')">Exp. 2026</button>
            <button class="filter-plate" data-filter="2025" onclick="filterGallery('2025')">Exp. 2025</button>
        </nav>

        <div class="gallery-room">
            
            <h2 class="year-divider" data-year="2026">2026</h2>
            
            <div class="art-frame" data-category="2026">
                <a href="https://i.imgur.com/PmjIQux.png" class="glightbox" data-gallery="camelia">
                    <div class="counter-tag">+20 OBRAS</div>
                    <img src="https://i.imgur.com/PmjIQux.png" alt="Festa das Camélias">
                    <div class="art-label">
                        <h3>Festa Internacional das Camélias</h3>
                        <p>Celorico da Beira, Portugal</p>
                    </div>
                </a>
                <div style="display:none">
                    <a href="https://i.imgur.com/EOkoi7x.png" class="glightbox" data-gallery="camelia"></a>
                </div>
            </div>

            <h2 class="year-divider" data-year="2025">2025</h2>
            
            <div class="art-frame" data-category="2025">
                <a href="https://i.imgur.com/aUixZ0Y.png" class="glightbox" data-gallery="vigo">
                    <div class="counter-tag">+56 OBRAS</div>
                    <img src="https://i.imgur.com/aUixZ0Y.png" alt="Vigo">
                    <div class="art-label">
                        <h3>Valência & Vigo</h3>
                        <p>Expedição Espanha</p>
                    </div>
                </a>
                <div style="display:none">
                    </div>
            </div>

        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js"></script>
    <script>
        // Inicializar GLightbox
        const lightbox = GLightbox({ selector: '.glightbox', loop: true });

        // MEMÓRIA E FILTRAGEM
        function filterGallery(year, save = true) {
            if(save) localStorage.setItem('exhibition_filter', year);
            
            const frames = document.querySelectorAll('.art-frame');
            const titles = document.querySelectorAll('.year-divider');
            const btns = document.querySelectorAll('.filter-plate');

            btns.forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-filter') === year));
            
            frames.forEach(frame => {
                frame.style.display = (year === 'all' || frame.getAttribute('data-category') === year) ? 'block' : 'none';
            });

            titles.forEach(title => {
                title.style.display = (year === 'all' || title.getAttribute('data-year') === year) ? 'block' : 'none';
            });
        }

        // EFEITO TILT 3D PROFISSIONAL
        document.querySelectorAll('.art-frame').forEach(frame => {
            frame.addEventListener('mousemove', (e) => {
                const rect = frame.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                
                frame.style.transform = `rotateX(${y * -10}deg) rotateY(${x * 10}deg) translateY(-5px)`;
                frame.style.boxShadow = `${-x * 30}px ${-y * 30}px 60px rgba(0,0,0,0.2)`;
            });

            frame.addEventListener('mouseleave', () => {
                frame.style.transform = 'rotateX(0deg) rotateY(0deg) translateY(0)';
                frame.style.boxShadow = '20px 30px 50px rgba(0,0,0,0.15)';
            });
        });

        // Recuperar filtro ao carregar
        window.onload = () => {
            const saved = localStorage.getItem('exhibition_filter') || 'all';
            filterGallery(saved, false);
        };
    </script>
</body>
</html>
