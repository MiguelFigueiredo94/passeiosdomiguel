<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Memórias - Passeios do Miguel</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/css/glightbox.min.css">
    
    <style>
        :root {
            --museum-wall: #f4f4f4;
            --plate-dark: #1a1a1a;
            --plate-silver: #e8e8e8;
            --accent: #ff8c00;
        }

        body { 
            font-family: 'Inter', sans-serif;
            margin: 0; 
            background-color: var(--museum-wall); 
            min-height: 100vh;
        }

        /* NAVEGAÇÃO FLUTUANTE DE MUSEU (SAIR E CONTACTOS) */
        .exit-gallery { position: fixed; bottom: 30px; left: 30px; z-index: 1000; }
        .contact-trigger { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }

        .nav-btn {
            background: rgba(26, 26, 26, 0.85);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.2);
        }

        .exit-btn:hover { background: #b30000; transform: translateY(-3px); }
        .contact-btn:hover { background: var(--accent); border-color: var(--accent); transform: translateY(-3px); }

        /* MODAL DE CONTACTOS (INTERNAL FLUTUANTE) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .contact-card {
            background: white;
            padding: 40px;
            width: 90%; max-width: 350px;
            text-align: center;
            border-top: 10px solid var(--accent);
            position: relative;
        }

        /* --- O BANNER ORIGINAL RECUPERADO (IMAGEM DO CABEÇALHO) --- */
        .gallery-header {
            height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            /* IMAGEM DO BANNER ORIGINAL AQUI */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1547891654-e66ed7ebb968?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-bottom: 5px solid var(--plate-dark);
        }

        .gallery-header h1 { 
            font-size: 3.5rem; margin: 0; font-weight: 200; 
            text-transform: uppercase; letter-spacing: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .gallery-header p { font-size: 1rem; opacity: 0.8; letter-spacing: 2px; }

        /* GRELHA E QUADROS */
        .gallery-room {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 70px;
            padding: 80px 10%;
            perspective: 1500px;
        }

        .art-frame {
            background: white;
            padding: 15px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
            transition: transform 0.1s ease-out; /* Transição suave para o Tilt */
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .art-frame img { 
            width: 100%; height: 300px; object-fit: cover; 
            border: 1px solid #000;
        }

        /* CHAPA DE INFO (ROTEIRO EM NOVA ABA) */
        .info-plate {
            margin-top: 15px;
            padding: 15px;
            background: var(--plate-silver);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ccc;
        }

        .info-plate h3 { margin: 0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #222;}

        .view-tour-btn {
            background: var(--plate-dark);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }

        .view-tour-btn:hover { background: var(--accent); }

        @media (max-width: 768px) {
            .gallery-header h1 { font-size: 2.2rem; letter-spacing: 5px; }
            .gallery-room { padding: 40px 5%; }
            .exit-gallery, .contact-trigger { position: relative; bottom: 0; left: 0; right: 0; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="exit-gallery">
        <a href="index.html" class="nav-btn exit-btn"><i class="fas fa-door-open"></i> Sair da Galeria</a>
    </div>

    <div class="contact-trigger">
        <button class="nav-btn contact-btn" onclick="toggleModal()"><i class="fas fa-address-book"></i> Contactos</button>
    </div>

    <div class="modal-overlay" id="contactModal">
        <div class="contact-card">
            <span style="position:absolute; top:10px; right:15px; cursor:pointer; font-size:20px;" onclick="toggleModal()">&times;</span>
            <h2 style="letter-spacing:2px; font-size:1.2rem;">CONTACTOS</h2>
            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
            <p><strong>Passeios do Miguel</strong></p>
            <p><i class="fas fa-phone"></i> +351 965 715 465</p>
            <p style="font-size:0.9rem;"><i class="fas fa-envelope"></i> geral@passeiosdomiguel.com</p>
        </div>
    </div>

    <main>
        <header class="gallery-header">
            <h1>MURAL DE MEMÓRIAS</h1>
            <p>O prazer de descobrir Portugal com a proximidade de um amigo</p>
        </header>

        <div class="gallery-room">
            
            <div class="art-frame">
                <a href="https://i.imgur.com/PmjIQux.png" class="glightbox" data-gallery="camelias">
                    <img src="https://i.imgur.com/PmjIQux.png">
                </a>
                <div class="info-plate">
                    <h3>Festa das Camélias</h3>
                    <a href="camelias.html" target="_blank" class="view-tour-btn">Ver Passeio</a>
                </div>
            </div>

            <div class="art-frame">
                <a href="https://i.imgur.com/link-da-imagem.png" class="glightbox" data-gallery="obidos">
                    <img src="https://i.imgur.com/link-da-imagem.png">
                </a>
                <div class="info-plate">
                    <h3>Vila de Óbidos</h3>
                    <a href="obidos.html" target="_blank" class="view-tour-btn">Ver Passeio</a>
                </div>
            </div>

            <div class="art-frame">
                <a href="https://i.imgur.com/aUixZ0Y.png" class="glightbox" data-gallery="vigo">
                    <img src="https://i.imgur.com/aUixZ0Y.png">
                </a>
                <div class="info-plate">
                    <h3>Valência & Vigo</h3>
                    <a href="vigo.html" target="_blank" class="view-tour-btn">Ver Passeio</a>
                </div>
            </div>

            </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js"></script>
    <script>
        // Inicializar Galeria Lightbox
        const lightbox = GLightbox({ selector: '.glightbox', loop: true });

        // ABRIR/FECHAR MODAL DE CONTACTOS
        function toggleModal() {
            const modal = document.getElementById('contactModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        // FECHAR MODAL AO CLICAR FORA
        window.onclick = function(event) {
            const modal = document.getElementById('contactModal');
            if (event.target == modal) modal.style.display = "none";
        }

        // --- SCRIPT DE INTERATIVIDADE 3D (TILT DOS QUADROS) ---
        function init3DTilt() {
            const items = document.querySelectorAll('.art-frame');

            items.forEach(item => {
                item.addEventListener('mousemove', (e) => {
                    const rect = item.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width - 0.5;
                    const y = (e.clientY - rect.top) / rect.height - 0.5;
                    
                    // Inclina o quadro (rotateX vertical, rotateY horizontal) e dá um ligeiro scale
                    item.style.transform = `rotateX(${y * -15}deg) rotateY(${x * 15}deg) scale(1.05)`;
                });

                item.addEventListener('mouseleave', () => {
                    item.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
                });
            });
        }

        // Inicializar o efeito 3D
        init3DTilt();
    </script>
</body>
</html>
