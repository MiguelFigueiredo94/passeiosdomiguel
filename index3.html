<!DOCTYPE html>
<html lang="pt">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G0BKTCRNV9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-G0BKTCRNV9');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Memórias - Passeios do Miguel</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/css/glightbox.min.css">
    
    <style>
        :root {
            --primary-blue: #1e4d8c;
            --accent-orange: #ff8c00;
            --dark-overlay: rgba(0, 0, 0, 0.4);
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            background-color: #f0f2f5; 
            min-height: 100vh; 
        }
        
        /* Espaço para o Menu Lateral Fixo */
        #menu-placeholder {
            position: fixed; top: 0; left: 0; width: 250px; height: 100vh; z-index: 1000;
        }
        
        main { flex-grow: 1; margin-left: 250px; transition: 0.3s; width: calc(100% - 250px); display: flex; flex-direction: column; }

        /* BANNER COM IMAGEM DE FUNDO */
        .gallery-header {
            position: relative;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            background: linear-gradient(var(--dark-overlay), var(--dark-overlay)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            border-bottom-right-radius: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .gallery-header h1 { 
            font-size: 3.5em; margin: 0; font-weight: 900; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* Navegação de Filtros Sticky */
        .filter-container { 
            padding: 20px; display: flex; justify-content: center; gap: 15px; 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 99; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .filter-btn { 
            padding: 10px 30px; border: 2px solid var(--primary-blue); background: white; 
            color: var(--primary-blue); border-radius: 50px; cursor: pointer; 
            font-weight: 800; transition: 0.3s; 
        }

        .filter-btn.active { background: var(--primary-blue); color: white; }

        /* Grid de Albuns */
        .gallery-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; padding: 40px 5%; flex-grow: 1;
        }

        .grid-year-title { 
            grid-column: 1 / -1; color: #222; font-size: 2.5em; 
            margin: 30px 0 10px 0; border-left: 8px solid var(--accent-orange); padding-left: 20px; 
        }

        .gallery-item { 
            position: relative; border-radius: 20px; overflow: hidden; height: 280px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: 0.4s;
        }

        .gallery-item:hover { transform: translateY(-10px); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .item-overlay { 
            position: absolute; bottom: 0; left: 0; right: 0; padding: 25px; 
            background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; 
        }

        .photo-count { 
            position: absolute; top: 15px; left: 15px; background: var(--accent-orange); 
            color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; 
        }

        /* Placeholder do Rodapé */
        #rodape-placeholder { width: 100%; }

        @media (max-width: 1024px) {
            body { display: block; }
            #menu-placeholder { position: relative; width: 100%; height: auto; }
            main { margin-left: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div id="menu-placeholder"></div>

    <main>
        <header class="gallery-header">
            <h1>Galeria de Memórias</h1>
            <p>Os momentos inesquecíveis dos nossos passeios</p>
        </header>

        <nav class="filter-container">
            <button class="filter-btn" data-filter="all" onclick="filterGallery('all')">TUDO</button>
            <button class="filter-btn" data-filter="2026" onclick="filterGallery('2026')">2026</button>
            <button class="filter-btn" data-filter="2025" onclick="filterGallery('2025')">2025</button>
        </nav>

        <div class="gallery-grid">
            <h2 class="grid-year-title" data-year="2026">2026</h2>
            
            <div class="gallery-item" data-category="2026">
                <a href="https://i.imgur.com/PmjIQux.png" class="glightbox" data-gallery="camelia">
                    <div class="photo-count"><i class="fas fa-camera"></i> +20</div>
                    <img src="https://i.imgur.com/PmjIQux.png">
                    <div class="item-overlay"><h3>Festa das Camélias</h3></div>
                </a>
                <div style="display:none">
                    </div>
            </div>

            <h2 class="grid-year-title" data-year="2025">2025</h2>
            <div class="gallery-item" data-category="2025">
                <a href="https://i.imgur.com/aUixZ0Y.png" class="glightbox" data-gallery="vigo">
                    <div class="photo-count"><i class="fas fa-camera"></i> +56</div>
                    <img src="https://i.imgur.com/aUixZ0Y.png">
                    <div class="item-overlay"><h3>Valência & Vigo</h3></div>
                </a>
                <div style="display:none">
                    </div>
            </div>
        </div>

        <div id="rodape-placeholder"></div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js"></script>
    <script>
        // Inicializar Galeria
        const lightbox = GLightbox({ selector: '.glightbox', loop: true });

        // FUNÇÃO PARA CARREGAR MENU E RODAPÉ EXTERNOS
        async function loadExternalContent() {
            try {
                const menuRes = await fetch('menu.html');
                if (menuRes.ok) document.getElementById('menu-placeholder').innerHTML = await menuRes.text();

                const rodapeRes = await fetch('rodape.html');
                if (rodapeRes.ok) document.getElementById('rodape-placeholder').innerHTML = await rodapeRes.text();
            } catch (err) {
                console.error("Erro ao carregar componentes:", err);
            }
        }

        // FILTRO COM MEMÓRIA
        function filterGallery(year, save = true) {
            if(save) localStorage.setItem('galeria_miguel_ano', year);

            const items = document.querySelectorAll('.gallery-item');
            const titles = document.querySelectorAll('.grid-year-title');
            const btns = document.querySelectorAll('.filter-btn');

            btns.forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-filter') === year);
            });

            items.forEach(item => {
                const itemYear = item.getAttribute('data-category');
                item.style.display = (year === 'all' || itemYear === year) ? 'block' : 'none';
            });

            titles.forEach(title => {
                const titleYear = title.getAttribute('data-year');
                title.style.display = (year === 'all' || titleYear === year) ? 'block' : 'none';
            });
        }

        // INICIALIZAÇÃO
        document.addEventListener('DOMContentLoaded', () => {
            loadExternalContent(); // Carrega menu.html e rodape.html
            
            const savedYear = localStorage.getItem('galeria_miguel_ano') || 'all';
            filterGallery(savedYear, false);
        });
    </script>
</body>
</html>
