<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museu de Memórias - Passeios do Miguel</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/css/glightbox.min.css">
    
    <style>
        :root {
            --primary-blue: #1e4d8c;
            --accent-orange: #ff8c00;
            --wall-bg: #f4f4f4; /* Parede clara e limpa */
            --frame-color: #1a1a1a;
        }

        body { 
            font-family: 'Georgia', serif; 
            margin: 0; 
            background-color: var(--wall-bg); 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* BOTÃO VOLTAR (INDEX.HTML) */
        .back-nav {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 1001;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            font-family: sans-serif;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .back-btn:hover {
            background: var(--primary-blue);
            transform: translateX(-5)px;
        }

        /* BANNER SEM MENU LATERAL */
        .gallery-header {
            position: relative;
            height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1547891654-e66ed7ebb968?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .gallery-header h1 { 
            font-size: 4em; margin: 0; font-weight: 400; 
            text-transform: uppercase; letter-spacing: 6px;
        }

        /* FILTROS ESTILO MUSEU */
        .filter-container { 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            background: #222; 
            position: sticky; top: 0; z-index: 100;
        }

        .filter-btn { 
            padding: 8px 25px; border: 1px solid #666; background: transparent; 
            color: #999; cursor: pointer; text-transform: uppercase; 
            font-size: 0.8em; transition: 0.3s; letter-spacing: 1px;
        }

        .filter-btn.active { background: white; color: black; border-color: white; }

        /* SALA DE EXPOSIÇÃO */
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 60px; 
            padding: 80px 10%; 
            perspective: 1200px;
        }

        .grid-year-title { 
            grid-column: 1 / -1; color: #333; font-size: 3em; 
            text-align: center; margin-bottom: 20px; opacity: 0.8;
        }

        /* MOLDURA INTERATIVA */
        .gallery-item { 
            position: relative; 
            background: var(--frame-color); 
            padding: 18px; 
            border-radius: 2px; 
            height: 350px; 
            box-shadow: 15px 25px 35px rgba(0,0,0,0.25);
            transition: transform 0.1s ease-out;
            cursor: pointer;
            transform-style: preserve-3d;
        }

        .gallery-item img { 
            width: 100%; height: 100%; object-fit: cover; 
            border: 1px solid #000;
        }
        
        .item-details { 
            position: absolute; bottom: -35px; left: 50%; 
            transform: translateX(-50%) translateZ(30px);
            background: #fff; color: #222; 
            padding: 12px 25px; border-radius: 2px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 1px solid #ddd; width: 85%; text-align: center;
        }

        .item-details h3 { margin: 0; font-size: 1.1em; text-transform: uppercase; }

        .photo-count { 
            position: absolute; top: 30px; left: 30px; 
            background: var(--accent-orange); color: white; 
            padding: 5px 12px; font-size: 12px; font-weight: bold; 
            z-index: 10; transform: translateZ(15px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .gallery-header h1 { font-size: 2.2em; }
            .gallery-grid { padding: 40px 5%; gap: 40px; }
        }
    </style>
</head>
<body>

    <nav class="back-nav">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> VOLTAR
        </a>
    </nav>

    <main>
        <header class="gallery-header">
            <h1>Museu de Memórias</h1>
            <p>O prazer de descobrir Portugal com a proximidade de um amigo</p>
        </header>

        <nav class="filter-container">
            <button class="filter-btn" data-filter="all" onclick="filterGallery('all')">COLEÇÃO</button>
            <button class="filter-btn" data-filter="2026" onclick="filterGallery('2026')">2026</button>
            <button class="filter-btn" data-filter="2025" onclick="filterGallery('2025')">2025</button>
        </nav>

        <div class="gallery-grid">
            <h2 class="grid-year-title" data-year="2026">2026</h2>
            
            <div class="gallery-item" data-category="2026">
                <a href="https://i.imgur.com/PmjIQux.png" class="glightbox" data-gallery="camelia">
                    <div class="photo-count"><i class="fas fa-images"></i> +20</div>
                    <img src="https://i.imgur.com/PmjIQux.png">
                    <div class="item-details">
                        <h3>Festa das Camélias</h3>
                        <p>Celorico da Beira</p>
                    </div>
                </a>
            </div>
            
            </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js"></script>
    <script>
        const lightbox = GLightbox({ selector: '.glightbox', loop: true });

        // MEMÓRIA DE FILTRO
        function filterGallery(year, save = true) {
            if(save) localStorage.setItem('filtro_museu', year);
            const items = document.querySelectorAll('.gallery-item');
            const titles = document.querySelectorAll('.grid-year-title');
            const btns = document.querySelectorAll('.filter-btn');

            btns.forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-filter') === year));
            items.forEach(item => item.style.display = (year === 'all' || item.getAttribute('data-category') === year) ? 'block' : 'none');
            titles.forEach(title => title.style.display = (year === 'all' || title.getAttribute('data-year') === year) ? 'block' : 'none');
        }

        // EFEITO 3D TILT
        document.querySelectorAll('.gallery-item').forEach(item => {
            item.addEventListener('mousemove', (e) => {
                const rect = item.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                item.style.transform = `rotateX(${y * -20}deg) rotateY(${x * 20}deg) scale(1.05)`;
            });
            item.addEventListener('mouseleave', () => {
                item.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
            });
        });

        window.onload = () => {
            filterGallery(localStorage.getItem('filtro_museu') || 'all', false);
        };
    </script>
</body>
</html>
