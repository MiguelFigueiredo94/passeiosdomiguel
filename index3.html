<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Memórias - Passeios do Miguel</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/css/glightbox.min.css">
    
    <style>
        :root {
            --museum-wall: #f0f0f0;
            --plate-dark: #1a1a1a;
            --plate-silver: #e0e0e0;
            --accent: #ff8c00;
        }

        body { 
            font-family: 'Inter', sans-serif;
            margin: 0; 
            background-color: var(--museum-wall); 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- BOTÃO SAIR (CANTO INFERIOR ESQUERDO) --- */
        .exit-gallery {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 1000;
        }

        .exit-btn {
            background: var(--plate-dark);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
        }

        .exit-btn:hover { background: #b30000; border-color: #f00; transform: translateY(-3px); }

        /* --- BOTÃO CONTACTOS (MODAL) --- */
        .contact-trigger {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
        }

        /* MODAL DE CONTACTOS */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .contact-card {
            background: white;
            padding: 40px;
            border-radius: 2px;
            text-align: center;
            max-width: 400px;
            border-top: 8px solid var(--accent);
            position: relative;
        }

        .contact-card h2 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }
        .contact-card p { margin: 10px 0; font-size: 1.1rem; color: #333; }
        .close-modal { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 1.5rem; }

        /* --- LAYOUT DA GALERIA --- */
        .exhibition-header {
            padding: 60px 20px;
            text-align: center;
            background: #fff;
            border-bottom: 1px solid #ddd;
        }

        .exhibition-header h1 { font-size: 2.5rem; font-weight: 200; text-transform: uppercase; letter-spacing: 10px; }

        .museum-filters {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            background: #f9f9f9;
            position: sticky; top: 0; z-index: 900;
        }

        .filter-plate {
            background: none; border: 1px solid #ccc; padding: 8px 20px;
            cursor: pointer; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;
        }

        .filter-plate.active { background: var(--plate-dark); color: white; }

        /* GRID DE QUADROS */
        .gallery-room {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 70px;
            padding: 80px 10%;
        }

        .art-frame {
            background: white;
            padding: 20px;
            box-shadow: 20px 30px 60px rgba(0,0,0,0.1);
            position: relative;
            border: 1px solid #e0e0e0;
        }

        .art-frame img { width: 100%; height: 300px; object-fit: cover; border: 1px solid #000; }

        /* CHAPA DE INFO POR BAIXO DO QUADRO */
        .art-info-plate {
            margin-top: 20px;
            padding: 15px;
            background: var(--plate-silver);
            border: 1px solid #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .art-info-plate h3 { margin: 0; font-size: 0.9rem; text-transform: uppercase; }
        
        .view-tour-btn {
            background: var(--plate-dark);
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .view-tour-btn:hover { background: var(--accent); }

        @media (max-width: 768px) {
            .exit-gallery, .contact-trigger { position: static; width: 100%; text-align: center; }
            .gallery-room { padding: 40px 5%; }
        }
    </style>
</head>
<body>

    <div class="exit-gallery">
        <a href="index.html" class="exit-btn"><i class="fas fa-door-open"></i> Sair da Galeria</a>
    </div>

    <button class="contact-trigger" onclick="toggleModal()"><i class="fas fa-address-book"></i> Contactos</button>

    <div class="modal-overlay" id="contactModal">
        <div class="contact-card">
            <span class="close-modal" onclick="toggleModal()">&times;</span>
            <h2>Passeios do Miguel</h2>
            <p><strong><i class="fas fa-phone"></i></strong> +351 965 715 465</p>
            <p><strong><i class="fas fa-envelope"></i></strong> geral@passeiosdomiguel.com</p>
            <p style="margin-top:20px; font-size: 0.8rem; color: #888;">Disponível para esclarecer todas as suas dúvidas.</p>
        </div>
    </div>

    <main>
        <header class="exhibition-header">
            <h1>Mural de Memórias</h1>
            <p>Clique nas obras para ampliar</p>
        </header>

        <nav class="museum-filters">
            <button class="filter-plate active" onclick="filterGallery('all')">Coleção</button>
            <button class="filter-plate" onclick="filterGallery('2026')">2026</button>
            <button class="filter-plate" onclick="filterGallery('2025')">2025</button>
        </nav>

        <div class="gallery-room">
            
            <div class="art-frame" data-category="2026">
                <a href="https://i.imgur.com/PmjIQux.png" class="glightbox" data-gallery="camelias">
                    <img src="https://i.imgur.com/PmjIQux.png">
                </a>
                <div class="art-info-plate">
                    <div>
                        <h3>Festa das Camélias</h3>
                    </div>
                    <a href="camelias.html" class="view-tour-btn">Ver Passeio</a>
                </div>
            </div>

            <div class="art-frame" data-category="2025">
                <a href="https://i.imgur.com/aUixZ0Y.png" class="glightbox" data-gallery="vigo">
                    <img src="https://i.imgur.com/aUixZ0Y.png">
                </a>
                <div class="art-info-plate">
                    <div>
                        <h3>Valência & Vigo</h3>
                    </div>
                    <a href="vigo.html" class="view-tour-btn">Ver Passeio</a>
                </div>
            </div>

            <div class="art-frame" data-category="2026">
                <a href="https://i.imgur.com/L58QRQc.png" class="glightbox" data-gallery="campo">
                    <img src="https://i.imgur.com/L58QRQc.png">
                </a>
                <div class="art-info-plate">
                    <div>
                        <h3>Campo Maior</h3>
                    </div>
                    <a href="campomaior.html" class="view-tour-btn">Ver Passeio</a>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js"></script>
    <script>
        const lightbox = GLightbox({ selector: '.glightbox', loop: true });

        // ABRIR/FECHAR MODAL
        function toggleModal() {
            const modal = document.getElementById('contactModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        // FECHAR MODAL AO CLICAR FORA
        window.onclick = function(event) {
            const modal = document.getElementById('contactModal');
            if (event.target == modal) modal.style.display = "none";
        }

        // FILTROS
        function filterGallery(year) {
            const frames = document.querySelectorAll('.art-frame');
            const btns = document.querySelectorAll('.filter-plate');
            
            btns.forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes(year) || (year === 'all' && btn.textContent === 'Coleção'));
            });

            frames.forEach(frame => {
                frame.style.display = (year === 'all' || frame.getAttribute('data-category') === year) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
