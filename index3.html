<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Memórias - Passeios do Miguel</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/css/glightbox.min.css">
    
    <style>
        :root {
            --museum-wall: #f4f4f4;
            --plate-dark: #1a1a1a;
            --plate-silver: #e8e8e8;
            --accent: #ff8c00;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--museum-wall); scroll-behavior: smooth; }

        /* NAVEGAÇÃO FLUTUANTE */
        .exit-gallery { position: fixed; bottom: 30px; left: 30px; z-index: 1000; }
        .contact-trigger { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        
        .nav-btn {
            background: rgba(26, 26, 26, 0.9); color: white; text-decoration: none;
            padding: 12px 25px; font-size: 0.8rem; letter-spacing: 2px;
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px); cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .nav-btn:hover { background: var(--accent); transform: translateY(-3px); }

        /* HEADER */
        .gallery-header {
            height: 400px; display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: white; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), 
                        url('https://i.imgur.com/PmjIQux.png'); /* Banner com a foto das camélias */
            background-size: cover; background-position: center; border-bottom: 8px solid var(--plate-dark);
        }
        .gallery-header h1 { font-size: 3.5rem; margin: 0; font-weight: 200; text-transform: uppercase; letter-spacing: 12px; }

        /* GRELHA */
        .gallery-room { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 60px; padding: 80px 10% 150px 10%; }
        .year-divider { grid-column: 1 / -1; font-size: 2.8rem; color: #222; border-bottom: 3px solid var(--plate-dark); padding-bottom: 10px; margin: 60px 0 20px 0; font-weight: 200; letter-spacing: 8px; text-transform: uppercase; }

        /* QUADRO */
        .art-frame { background: white; padding: 15px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); border: 1px solid #ddd; position: relative; transition: 0.4s ease; }
        .art-frame:hover { transform: translateY(-10px); }
        .art-frame img { width: 100%; height: 300px; object-fit: cover; border: 1px solid #000; cursor: pointer; }
        
        .photo-count {
            position: absolute; top: 25px; right: 25px; background: var(--accent);
            color: white; padding: 6px 12px; font-size: 0.7rem; font-weight: bold; z-index: 5;
        }

        .info-plate { margin-top: 15px; padding: 15px; background: var(--plate-silver); display: flex; justify-content: space-between; align-items: center; border: 1px solid #ccc; }
        .info-plate h3 { margin: 0; font-size: 0.85rem; text-transform: uppercase; color: #1a1a1a; }
        .view-tour-btn { background: var(--plate-dark); color: white; text-decoration: none; padding: 8px 15px; font-size: 0.65rem; text-transform: uppercase; font-weight: bold; transition: 0.3s; }
        .view-tour-btn:hover { background: var(--accent); }

        .hidden-photos { display: none; }

        /* MODAL CONTACTOS */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center;
        }
        .contact-card { background: white; padding: 40px; width: 320px; text-align: center; border-top: 10px solid var(--accent); position: relative; }
    </style>
</head>
<body>

    <div class="exit-gallery"><a href="index.html" class="nav-btn"><i class="fas fa-door-open"></i> Sair da Galeria</a></div>
    <div class="contact-trigger"><button class="nav-btn" onclick="toggleModal()"><i class="fas fa-address-book"></i> Contactos</button></div>

    <div class="modal-overlay" id="contactModal">

            <h2 style="letter-spacing:2px; font-size:1.2rem;">CONTACTOS</h2>
            <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
            <p><strong>Passeios do Miguel</strong></p>
            <p><i class="fas fa-phone"></i> +351 965 715 465</p>

    </div>

                </div>

                <div class="info-plate">

            </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js"></script>
    <script>
        const lightbox = GLightbox({ 
            selector: '.glightbox', 
            loop: true,
            openEffect: 'zoom',
            closeEffect: 'zoom'
        });

        function toggleModal() {
            const modal = document.getElementById('contactModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('contactModal');
            if (event.target == modal) modal.style.display = "none";
        }
    </script>
</body>
</html>
