<!DOCTYPE html>
<html lang="pt">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G0BKTCRNV9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-G0BKTCRNV9');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Memórias - Passeios do Miguel</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/css/glightbox.min.css">
    
    <style>
        :root {
            --primary-blue: #1e4d8c;
            --accent-orange: #ff8c00;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.1);
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; background-color: #f0f2f5; min-height: 100vh; color: #333; }
        
        #menu-placeholder { position: fixed; top: 0; left: 0; width: 250px; height: 100vh; z-index: 1000; background: #fff; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        
        main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; margin-left: 250px; transition: all 0.3s; }

        /* HEADER BRILHANTE */
        .gallery-header {
            background: linear-gradient(135deg, rgba(30, 77, 140, 0.9), rgba(255, 140, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1542332213-9b5a5a3fab35?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center; color: white;
            padding: 100px 40px; text-align: center; position: relative;
            clip-path: ellipse(150% 100% at 50% 0%); /* Curva elegante */
        }
        .gallery-header h1 { font-size: 3.5em; margin-bottom: 10px; font-weight: 900; letter-spacing: -1px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        .gallery-header p { font-size: 1.2em; opacity: 0.9; font-weight: 300; }

        /* FILTROS GLASSMORPHISM */
        .filter-container { 
            padding: 20px; display: flex; justify-content: center; gap: 15px; 
            background: var(--glass-bg); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); flex-wrap: wrap; margin-top: -30px;
            width: fit-content; margin-left: auto; margin-right: auto; border-radius: 50px;
        }
        .filter-btn { 
            padding: 12px 30px; border: none; background: #fff; 
            color: var(--primary-blue); border-radius: 50px; cursor: pointer; 
            font-weight: 700; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .filter-btn:hover { transform: scale(1.1); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .filter-btn.active { background: var(--primary-blue); color: white; box-shadow: 0 8px 15px rgba(30, 77, 140, 0.3); }

        /* GRID E CARDS MAGNÍFICOS */
        .gallery-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 30px; padding: 60px 40px; max-width: 1600px; margin: 0 auto; width: 100%;
        }
        .grid-year-title { 
            grid-column: 1 / -1; color: var(--primary-blue); font-size: 2.8em; 
            margin-top: 40px; position: relative; display: inline-block; font-weight: 900;
        }
        .grid-year-title::after {
            content: ''; position: absolute; bottom: -5px; left: 0; width: 60px; height: 5px; background: var(--accent-orange); border-radius: 5px;
        }

        .gallery-item { 
            position: relative; border-radius: 20px; overflow: hidden; height: 320px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); cursor: pointer; transition: 0.5s ease; background: #fff;
        }
        .gallery-item:hover { transform: translateY(-15px) rotate(1deg); box-shadow: 0 25px 50px rgba(0,0,0,0.15); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .gallery-item:hover img { transform: scale(1.15); }
        
        .item-overlay { 
            position: absolute; bottom: 0; left: 0; right: 0; padding: 30px 20px; 
            background: linear-gradient(transparent, rgba(0,0,0,0.85)); color: white; 
            transform: translateY(20px); transition: 0.4s;
        }
        .gallery-item:hover .item-overlay { transform: translateY(0); }
        .item-overlay h4 { margin: 0; font-size: 1.4em; font-weight: 600; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }

        .photo-count { 
            position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.9); 
            color: var(--primary-blue); padding: 8px 16px; border-radius: 12px; font-size: 14px; 
            font-weight: 800; z-index: 3; box-shadow: 0 4px 10px rgba(0,0,0,0.1); backdrop-filter: blur(5px);
        }

        .hidden-photos { display: none; }

        /* RESPONSIVIDADE */
        @media (max-width: 1024px) {
            #menu-placeholder { width: 100%; height: auto; position: relative; }
            main { margin-left: 0 !important; width: 100% !important; }
            .gallery-header h1 { font-size: 2.2em; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); padding: 20px; }
            .gallery-item { height: 240px; }
        }
    </style>
</head>
<body>

    <div id="menu-placeholder"></div>

    <main>
        <header class="gallery-header">
            <h1>Galeria de Memórias</h1>
            <p><i class="fas fa-camera-retro"></i> Explore os melhores momentos das viagens do Miguel</p>
        </header>

        <div class="filter-container">
            <button class="filter-btn active" onclick="filterGallery('all')">Tudo</button>
            <button class="filter-btn" onclick="filterGallery('2026')">2026</button>
            <button class="filter-btn" onclick="filterGallery('2025')">2025</button>
        </div>

        <div class="gallery-grid">
            <h2 class="grid-year-title" data-year="2026">2026</h2>
            
            <div class="gallery-item" data-category="2026">
                <a href="https://i.imgur.com/L58QRQc.png" class="glightbox" data-gallery="campo">
                    <img src="https://i.imgur.com/L58QRQc.png" alt="Campo Maior">
                    <div class="item-overlay"><h4>Campo Maior</h4></div>
                </a>
            </div>

            <div class="gallery-item" data-category="2026">
                <a href="https://i.imgur.com/PmjIQux.png" class="glightbox" data-gallery="camelia">
                    <div class="photo-count"><i class="fas fa-images"></i> +20</div>
                    <img src="https://i.imgur.com/PmjIQux.png" alt="Festa das Camélias">
                    <div class="item-overlay"><h4>Festa das Camélias</h4></div>
                </a>
                <div class="hidden-photos">
                    <a href="https://i.imgur.com/EOkoi7x.png" class="glightbox" data-gallery="camelia"></a>
                    <a href="https://i.imgur.com/9kW5H4x.png" class="glightbox" data-gallery="camelia"></a>
                </div>
            </div>

            <h2 class="grid-year-title" data-year="2025">2025</h2>
            
            <div class="gallery-item" data-category="2025">
                <a href="https://i.imgur.com/aUixZ0Y.png" class="glightbox" data-gallery="vigo">
                    <div class="photo-count"><i class="fas fa-images"></i> +56</div>
                    <img src="https://i.imgur.com/aUixZ0Y.png" alt="Valência & Vigo">
                    <div class="item-overlay"><h4>Valência & Vigo</h4></div>
                </a>
                <div class="hidden-photos">
                     <a href="https://i.imgur.com/cb5VM8v.jpg" class="glightbox" data-gallery="vigo"></a>
                     </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js"></script>
    <script>
        // Inicializar GLightbox
        const lightbox = GLightbox({
            selector: '.glightbox',
            touchNavigation: true,
            loop: true
        });

        // Função de Filtro Melhorada
        function filterGallery(year) {
            const items = document.querySelectorAll('.gallery-item');
            const titles = document.querySelectorAll('.grid-year-title');
            const btns = document.querySelectorAll('.filter-btn');

            // Atualizar Botões
            btns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            items.forEach(item => {
                if (year === 'all' || item.getAttribute('data-category') === year) {
                    item.style.display = 'block';
                    setTimeout(() => item.style.opacity = '1', 10);
                } else {
                    item.style.opacity = '0';
                    setTimeout(() => item.style.display = 'none', 300);
                }
            });

            titles.forEach(title => {
                if (year === 'all' || title.getAttribute('data-year') === year) {
                    title.style.display = 'block';
                } else {
                    title.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
