    <style>
        :root {
            --primary-blue: #1e4d8c;
            --accent-orange: #ff8c00;
            --glass-bg: rgba(255, 255, 255, 0.9);
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background-color: #f8f9fa; min-height: 100vh; }
        
        /* Estrutura Lateral Mantida */
        #menu-placeholder {
            position: fixed; top: 0; left: 0; width: 250px; height: 100vh; z-index: 1000;
        }
        
        main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; margin-left: 250px; transition: 0.3s; }

        /* Banner Estilo Premium */
        .gallery-header {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1542332213-9b5a5a3fab35?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center; color: white;
            padding: 90px 20px; text-align: center; border-radius: 0 0 50px 0;
        }
        .gallery-header h1 { font-size: 3em; margin-bottom: 10px; font-weight: 800; }

        /* Filtros com Efeito Sticky e Glass */
        .filter-container { 
            padding: 20px; display: flex; justify-content: center; gap: 12px; 
            background: var(--glass-bg); backdrop-filter: blur(8px);
            position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); flex-wrap: wrap;
        }
        .filter-btn { 
            padding: 10px 28px; border: 2px solid var(--primary-blue); background: transparent; 
            color: var(--primary-blue); border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; 
        }
        .filter-btn.active { background: var(--primary-blue); color: white; box-shadow: 0 4px 12px rgba(30, 77, 140, 0.3); }

        /* Grid e Itens */
        .gallery-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; padding: 40px 20px; max-width: 1400px; margin: 0 auto; width: 100%;
        }
        .grid-year-title { 
            grid-column: 1 / -1; color: var(--primary-blue); font-size: 2.5em; 
            margin-top: 30px; border-left: 8px solid var(--accent-orange); padding-left: 20px; font-weight: 800; 
        }

        .gallery-item { 
            position: relative; border-radius: 20px; overflow: hidden; height: 280px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.08); cursor: pointer; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .gallery-item:hover { transform: translateY(-10px); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .gallery-item:hover img { transform: scale(1.1); }
        
        .item-overlay { 
            position: absolute; bottom: 0; left: 0; right: 0; padding: 25px; 
            background: linear-gradient(transparent, rgba(0,0,0,0.85)); color: white; 
        }
        .photo-count { 
            position: absolute; top: 15px; left: 15px; background: var(--accent-orange); 
            color: white; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; z-index: 3; 
        }

        .hidden-photos { display: none; }
        #footer-placeholder { background: #333; color: white; padding: 40px 20px; }

        @media (max-width: 1024px) {
            body { display: block; }
            #menu-placeholder { position: relative; width: 100%; height: auto; }
            main { margin-left: 0 !important; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); padding: 15px; }
            .gallery-item { height: 200px; }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js"></script>
    <script>
        const lightbox = GLightbox({ selector: '.glightbox', loop: true });

        // FUNÇÃO DE MEMÓRIA DO FILTRO
        function filterGallery(year, save = true) {
            if(save) localStorage.setItem('selectedYear', year);

            const items = document.querySelectorAll('.gallery-item');
            const titles = document.querySelectorAll('.grid-year-title');
            const btns = document.querySelectorAll('.filter-btn');

            btns.forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-filter') === year);
            });

            items.forEach(item => {
                const itemYear = item.getAttribute('data-category');
                item.style.display = (year === 'all' || itemYear === year) ? 'block' : 'none';
            });

            titles.forEach(title => {
                const titleYear = title.getAttribute('data-year');
                title.style.display = (year === 'all' || titleYear === year) ? 'block' : 'none';
            });
        }

        // Ao carregar a página, verifica se há um filtro guardado
        window.onload = () => {
            const savedYear = localStorage.getItem('selectedYear') || 'all';
            filterGallery(savedYear, false);
            
            // Aqui carregas o teu menu/footer se usares fetch
            // fetch('menu.html').then(r => r.text()).then(d => document.getElementById('menu-placeholder').innerHTML = d);
        };
