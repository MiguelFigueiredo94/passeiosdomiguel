<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Memórias - Passeios do Miguel</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/css/glightbox.min.css">
    
    <style>
        :root {
            --bg-wall: #e0e0e0;
            --frame-dark: #1a1a1a;
            --plate-gold: #c5a059;
            --accent: #1a1a1a;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg-wall); overflow-x: hidden; }

        /* HEADER NEUTRO */
        .gallery-header {
            height: 400px; display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: white; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1499781350541-7783f6c6a0c8?q=80&w=2115&auto=format&fit=crop'); /* Imagem de Museu/Arte */
            background-size: cover; background-position: center; border-bottom: 5px solid var(--frame-dark);
        }
        .gallery-header h1 { font-size: 3rem; font-weight: 200; text-transform: uppercase; letter-spacing: 12px; margin: 0; }

        /* CHAPAS DE FILTRO (MENU) */
        .filter-nav { 
            display: flex; justify-content: center; gap: 20px; 
            padding: 40px 0; background: #d6d6d6; box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }
        .filter-btn {
            background: #f0f0f0; border: 1px solid #aaa; padding: 10px 25px;
            text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s; color: #444; font-weight: bold;
            box-shadow: 3px 3px 0px #999;
        }
        .filter-btn:hover, .filter-btn.active { background: var(--frame-dark); color: white; transform: translate(-2px, -2px); box-shadow: 5px 5px 0px var(--plate-gold); }

        /* GRELHA */
        .gallery-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); 
            gap: 60px; padding: 60px 8%; 
        }

        /* QUADRO DE EXPOSIÇÃO */
        .museum-frame {
            background: #fff; padding: 30px; border: 12px solid var(--frame-dark);
            box-shadow: 20px 20px 50px rgba(0,0,0,0.15); transition: 0.4s;
            position: relative; display: block;
        }
        .museum-frame:hover { transform: scale(1.02); }

        .image-container { position: relative; width: 100%; height: 280px; overflow: hidden; border: 1px solid #000; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        /* CHAPA DE IDENTIFICAÇÃO FORMAL */
        .item-plate {
            margin-top: 25px; padding: 15px; border: 1px solid #ccc;
            background: linear-gradient(145deg, #e6e6e6, #ffffff);
            text-align: center; position: relative;
        }
        .item-plate h3 { margin: 0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #111; }
        .item-plate span { font-size: 0.65rem; color: #777; display: block; margin-top: 5px; text-transform: uppercase; }

        /* BOTÕES FLUTUANTES */
        .nav-fixed { position: fixed; bottom: 30px; z-index: 1000; }
        .btn-action { 
            background: var(--frame-dark); color: white; border: none; padding: 12px 20px;
            font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
            text-decoration: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn-action:hover { background: var(--plate-gold); color: black; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js"></script>
    <script>
        // Inicializar Lightbox com setas
        const lightbox = GLightbox({ 
            selector: '.glightbox',
            loop: true,
            openEffect: 'zoom',
            closeEffect: 'zoom'
        });

        // Função de Filtro
        function filterGallery(year) {
            // Atualizar botões
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Filtrar Quadros
            const frames = document.querySelectorAll('.museum-frame');
            frames.forEach(frame => {
                if (year === 'all' || frame.getAttribute('data-year') === year) {
                    frame.style.display = 'block';
                } else {
                    frame.style.display = 'none';
                }
            });
        }
    </script>
