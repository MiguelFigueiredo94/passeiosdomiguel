<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museu de Memórias - Passeios do Miguel</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/css/glightbox.min.css">
    
    <style>
        :root {
            --wood-dark: #5d4037;
            --wood-light: #8d6e63;
            --accent-orange: #ff8c00;
        }

        body { 
            font-family: 'Georgia', serif; 
            margin: 0; 
            background: #e0e0e0; /* Cor de parede de galeria */
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- O POSTE DE SINALIZAÇÃO (MENU) --- */
        .signpost-container {
            position: fixed;
            top: 50px;
            left: 30px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(5px 10px 15px rgba(0,0,0,0.3));
        }

        /* O mastro de madeira */
        .signpost-post {
            width: 12px;
            height: 400px;
            background: linear-gradient(90deg, #3e2723, #5d4037, #3e2723);
            border-radius: 2px;
            position: absolute;
            top: 0;
            z-index: -1;
        }

        /* As Placas/Botões */
        .sign-link {
            text-decoration: none;
            display: block;
            margin-bottom: 25px;
            position: relative;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sign-board {
            background: #d4a373; /* Cor de madeira clara */
            color: #3e2723;
            padding: 12px 25px;
            font-weight: bold;
            font-family: sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2), 3px 5px 0px rgba(0,0,0,0.1);
            border: 2px solid #5d4037;
            min-width: 150px;
            text-align: center;
            position: relative;
            clip-path: polygon(90% 0%, 100% 50%, 90% 100%, 0% 100%, 0% 0%); /* Formato de seta */
        }

        /* Variação de direção das placas */
        .sign-link:nth-child(even) .sign-board {
            clip-path: polygon(10% 0%, 100% 0%, 100% 100%, 10% 100%, 0% 50%);
            background: #bc6c25;
            color: white;
        }

        .sign-link:hover {
            transform: scale(1.1) rotate(2deg);
        }

        .sign-link:nth-child(even):hover {
            transform: scale(1.1) rotate(-2deg);
        }

        /* Parafusos das placas */
        .sign-board::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 15px;
            width: 6px;
            height: 6px;
            background: #3e2723;
            border-radius: 50%;
            transform: translateY(-50%);
        }

        /* --- CONTEÚDO DA PÁGINA --- */
        main { 
            margin-left: 220px; /* Dá espaço para o poste */
            width: calc(100% - 220px);
        }

        .gallery-header {
            padding: 80px 20px;
            text-align: center;
            background: #222;
            color: white;
            border-bottom-right-radius: 100px;
        }

        .gallery-header h1 { font-size: 3.5em; letter-spacing: 5px; margin: 0; }

        .filter-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 900;
            backdrop-filter: blur(10px);
        }

        .filter-btn {
            background: white;
            border: 2px solid var(--wood-dark);
            padding: 8px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .filter-btn.active {
            background: var(--wood-dark);
            color: white;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 50px;
            padding: 60px 5%;
        }

        /* MOLDURA DO MUSEU */
        .gallery-item {
            background: #1a1a1a;
            padding: 15px;
            box-shadow: 15px 20px 30px rgba(0,0,0,0.3);
            transition: 0.1s ease-out;
            cursor: pointer;
        }

        .gallery-item img { width: 100%; height: 280px; object-fit: cover; }

        .item-label {
            background: white;
            margin-top: 15px;
            padding: 10px;
            text-align: center;
            border: 1px solid #ddd;
        }

        @media (max-width: 768px) {
            .signpost-container { position: relative; left: 0; top: 0; flex-direction: row; padding: 20px; gap: 10px; overflow-x: auto; }
            .signpost-post { display: none; }
            main { margin-left: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="signpost-container">
        <div class="signpost-post"></div>
        
        <a href="index.html" class="sign-link">
            <div class="sign-board">Início</div>
        </a>
        
        <a href="passeios.html" class="sign-link">
            <div class="sign-board">Passeios</div>
        </a>
        
        <a href="contactos.html" class="sign-link">
            <div class="sign-board">Contactos</div>
        </a>
    </div>

    <main>
        <header class="gallery-header">
            <h1>MUSEU DE MEMÓRIAS</h1>
            <p>Siga as placas para navegar na nossa história</p>
        </header>

        <nav class="filter-container">
            <button class="filter-btn" data-filter="all" onclick="filterGallery('all')">Coleção</button>
            <button class="filter-btn" data-filter="2026" onclick="filterGallery('2026')">2026</button>
            <button class="filter-btn" data-filter="2025" onclick="filterGallery('2025')">2025</button>
        </nav>

        <div class="gallery-grid">
            <div class="gallery-item" data-category="2026">
                <a href="https://i.imgur.com/PmjIQux.png" class="glightbox">
                    <img src="https://i.imgur.com/PmjIQux.png">
                    <div class="item-label">
                        <strong>Festa das Camélias</strong><br>
                        <small>Celorico da Beira</small>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js"></script>
    <script>
        const lightbox = GLightbox({ selector: '.glightbox', loop: true });

        // FILTRO COM MEMÓRIA
        function filterGallery(year, save = true) {
            if(save) localStorage.setItem('museu_filter', year);
            const items = document.querySelectorAll('.gallery-item');
            const btns = document.querySelectorAll('.filter-btn');

            btns.forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-filter') === year));
            items.forEach(item => item.style.display = (year === 'all' || item.getAttribute('data-category') === year) ? 'block' : 'none');
        }

        // TILT 3D NAS MOLDURAS
        document.querySelectorAll('.gallery-item').forEach(item => {
            item.addEventListener('mousemove', (e) => {
                const rect = item.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                item.style.transform = `rotateX(${y * -15}deg) rotateY(${x * 15}deg) scale(1.05)`;
            });
            item.addEventListener('mouseleave', () => item.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)');
        });

        window.onload = () => filterGallery(localStorage.getItem('museu_filter') || 'all', false);
    </script>
</body>
</html>
