<!DOCTYPE html>
<html lang="pt">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G0BKTCRNV9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-G0BKTCRNV9');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Memórias - Passeios do Miguel</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/css/glightbox.min.css">
    
    <style>
        :root {
            --primary-blue: #1e4d8c;
            --accent-orange: #ff8c00;
            --dark-overlay: rgba(0, 0, 0, 0.4);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            background-color: #f0f2f5; 
            min-height: 100vh; 
        }
        
        /* Placeholder para o teu Menu Lateral */
        #menu-placeholder {
            position: fixed; top: 0; left: 0; width: 250px; height: 100vh; z-index: 1000;
            background: #fff; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        
        main { flex-grow: 1; margin-left: 250px; transition: 0.3s; width: calc(100% - 250px); }

        /* O BANNER "SUPER DOS SUPERS" */
        .gallery-header {
            position: relative;
            height: 450px; /* Altura imponente */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            /* IMAGEM DO BANNER AQUI */
            background: linear-gradient(var(--dark-overlay), var(--dark-overlay)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: scroll;
            border-bottom-right-radius: 80px; /* Corte moderno */
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .gallery-header h1 { 
            font-size: 4em; 
            margin: 0; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.6);
        }

        .gallery-header p { 
            font-size: 1.4em; 
            font-weight: 300; 
            background: rgba(0,0,0,0.3);
            padding: 5px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        /* Filtros com Memória e Design Glass */
        .filter-container { 
            padding: 25px; 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            position: sticky; 
            top: 0; 
            z-index: 99; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .filter-btn { 
            padding: 12px 35px; 
            border: 2px solid var(--primary-blue); 
            background: white; 
            color: var(--primary-blue); 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 800; 
            transition: 0.4s; 
        }

        .filter-btn.active { 
            background: var(--primary-blue); 
            color: white; 
            box-shadow: 0 5px 15px rgba(30, 77, 140, 0.3); 
        }

        /* Grid de Albuns */
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 30px; 
            padding: 50px 5%; 
        }

        .grid-year-title { 
            grid-column: 1 / -1; 
            color: #222; 
            font-size: 2.8em; 
            margin: 40px 0 20px 0; 
            border-left: 10px solid var(--accent-orange); 
            padding-left: 20px; 
        }

        .gallery-item { 
            position: relative; 
            border-radius: 25px; 
            overflow: hidden; 
            height: 300px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            transition: 0.5s ease;
        }

        .gallery-item:hover { transform: translateY(-15px); box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .gallery-item:hover img { transform: scale(1.15); }
        
        .item-overlay { 
            position: absolute; bottom: 0; left: 0; right: 0; padding: 30px; 
            background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; 
        }

        .photo-count { 
            position: absolute; top: 20px; left: 20px; 
            background: var(--accent-orange); color: white; 
            padding: 8px 16px; border-radius: 50px; font-size: 14px; font-weight: bold; 
        }

        #footer-placeholder { background: #1a1a1a; color: white; padding: 60px 20px; text-align: center; }

        @media (max-width: 1024px) {
            body { display: block; }
            #menu-placeholder { position: relative; width: 100%; height: auto; }
            main { margin-left: 0; width: 100%; }
            .gallery-header h1 { font-size: 2.5em; }
        }
    </style>
</head>
<body>

    <div id="menu-placeholder">
        </div>

    <main>
        <header class="gallery-header">
            <h1>Galeria de Memórias</h1>
            <p>O melhor álbum do mundo, para as melhores recordações</p>
        </header>

        <nav class="filter-container">
            <button class="filter-btn" data-filter="all" onclick="filterGallery('all')">VER TUDO</button>
            <button class="filter-btn" data-filter="2026" onclick="filterGallery('2026')">2026</button>
            <button class="filter-btn" data-filter="2025" onclick="filterGallery('2025')">2025</button>
        </nav>

        <div class="gallery-grid">
            <h2 class="grid-year-title" data-year="2026">Temporada 2026</h2>
            
            <div class="gallery-item" data-category="2026">
                <a href="https://i.imgur.com/PmjIQux.png" class="glightbox" data-gallery="camelia">
                    <div class="photo-count"><i class="fas fa-camera"></i> +20 Fotos</div>
                    <img src="https://i.imgur.com/PmjIQux.png">
                    <div class="item-overlay"><h3>Festa das Camélias</h3></div>
                </a>
                <div style="display:none">
                    <a href="https://i.imgur.com/EOkoi7x.png" class="glightbox" data-gallery="camelia"></a>
                    </div>
            </div>

            </div>

        <div id="footer-placeholder">
            </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js"></script>
    <script>
        const lightbox = GLightbox({ selector: '.glightbox', loop: true });

        // SISTEMA DE MEMÓRIA DE FILTRO
        function filterGallery(year, save = true) {
            if(save) localStorage.setItem('miguel_gallery_filter', year);

            const items = document.querySelectorAll('.gallery-item');
            const titles = document.querySelectorAll('.grid-year-title');
            const btns = document.querySelectorAll('.filter-btn');

            btns.forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-filter') === year);
            });

            items.forEach(item => {
                const itemYear = item.getAttribute('data-category');
                item.style.display = (year === 'all' || itemYear === year) ? 'block' : 'none';
            });

            titles.forEach(title => {
                const titleYear = title.getAttribute('data-year');
                title.style.display = (year === 'all' || titleYear === year) ? 'block' : 'none';
            });
        }

        // Recuperar o filtro ao entrar na página
        document.addEventListener('DOMContentLoaded', () => {
            const lastFilter = localStorage.getItem('miguel_gallery_filter') || 'all';
            filterGallery(lastFilter, false);
            
            // Simulação de carregamento de menu/footer (se usares ficheiros externos)
            // fetch('menu.html').then(r => r.text()).then(d => document.getElementById('menu-placeholder').innerHTML = d);
        });
    </script>
</body>
</html>
