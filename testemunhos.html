<section class="seccao-mural">
    <div class="container-mural">
        
        <div style="background: #fdfdfd; padding: 25px; border: 1px dashed #ff8c00; border-radius: 15px; margin-bottom: 40px;">
            <h3 style="color: #1e4d8c; margin-top: 0;">Quer deixar a sua opinião?</h3>
            <p style="font-size: 14px; color: #666;">Escreva abaixo e clique para me enviar via WhatsApp. Eu publico no mural em seguida!</p>
            
            <input type="text" id="nome-testemunho" placeholder="O seu nome" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd;">
            <textarea id="texto-testemunho" placeholder="Conte como foi a sua experiência..." rows="3" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd;"></textarea>
            
            <button onclick="enviarTestemunho()" style="background: #25d366; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold;">
                <i class="fab fa-whatsapp"></i> Enviar para o Miguel
            </button>
        </div>

        <h2 style="color: #1e4d8c; border-bottom: 2px solid #ff8c00; padding-bottom: 10px;">Testemunhos Recentes</h2>

        <div id="mural-lista">
            
            <div class="comentario-card" style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border-left: 5px solid #ff8c00;">
                <strong style="color: #1e4d8c;">Rosário</strong> <small style="float: right; color: #999;">28 de Março, 2026</small>
                <p style="margin: 10px 0 0; font-style: italic; color: #555;">"O Passeio a Celorico de Basto foi incrível... fantástico."</p>
            </div>

            </div>
    </div>
</section>

<script>
function enviarTestemunho() {
    const nome = document.getElementById('nome-testemunho').value;
    const msg = document.getElementById('texto-testemunho').value;
    const texto = `Olá Miguel! Queria deixar este testemunho para o site:%0A%0A*Nome:* ${nome}%0A*Mensagem:* ${msg}`;
    window.open(`https://wa.me/351965715465?text=${texto}`, '_blank');
}
</script>
