    .footer-premium {

    /* Linha Dourada Animada */
    .premium-line {

        left: -100%; 
        height: 4px; 
        width: 100%; 
        background: linear-gradient(90deg, transparent, #ff8c00, #ffd700, #ff8c00, transparent); 
        animation: goldRun 4s linear infinite;

    @keyframes goldRun { 0% { left: -100%; } 100% { left: 100%; } }

    .footer-grid { 
        display: grid; 
        grid-template-columns: 1.2fr 1fr 1fr; 
        gap: 40px; 
        max-width: 1200px; 
        margin: 0 auto; 
    }

    .footer-premium h4 { 
        color: #ff8c00; 
        text-transform: uppercase; 
        font-size: 13px; 
        margin-bottom: 18px; 
        border-bottom: 1px solid rgba(255,140,0,0.3); 
        display: inline-block; 
        padding-bottom: 4px; 
        font-weight: 700; 
        letter-spacing: 1px;
    }

    /* Coluna Navegação */
    .footer-nav-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .footer-nav-cols a { 
        color: white; 
        text-decoration: none; 
        font-size: 13px; 
        opacity: 0.8; 
        transition: 0.3s; 
        display: block; 
        margin-bottom: 8px;

    .footer-nav-cols a:hover { opacity: 1; color: #ff8c00; transform: translateX(5px); }

        padding: 10px 20px; 
        border-radius: 50px; 
        color: white !important; 
        text-decoration: none; 
        font-size: 13px; 
        transition: 0.3s; 
        width: fit-content;
    }
    .btn-footer:hover { 
        background: rgba(255,255,255,0.12); 
        border-color: white; 
        transform: translateY(-2px);
    }
    .btn-footer i { color: #ff8c00; font-size: 14px; }

    .alert-link { 
        display: flex; 
        align-items: center; 
        gap: 10px; 
        color: white !important;
        text-decoration: none; 
        font-size: 13px; 
        opacity: 0.8; 
        margin-top: 5px; 
        transition: 0.3s;

    .alert-link:hover { opacity: 1; color: #ff8c00; }
    .alert-link i { color: #ff8c00; }

    .footer-bottom { 
        text-align: center; 
        margin-top: 30px; 
        font-size: 11px; 
        opacity: 0.5; 
        border-top: 1px solid rgba(255,255,255,0.1);

    @media (max-width: 1024px) { 
        .footer-grid { grid-template-columns: 1fr; text-align: center; } 
        .footer-premium h4 { display: block; width: fit-content; margin: 0 auto 18px; }

        .btn-footer, .alert-link { justify-content: center; margin: 0 auto; }
