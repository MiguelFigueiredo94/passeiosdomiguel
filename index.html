<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Passeios do Miguel - Passeios com Alma e Aventura</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Estilo para o container do vídeo do YouTube */
        .container-video-index { width: 100%; max-width: 1000px; margin: 30px auto; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        /* Garante que o iframe ocupa todo o espaço do container */
        .container-video-index iframe { width: 100%; height: 500px; display: block; }
        
        .intro-text { text-align: center; padding: 20px; font-size: 1.2em; color: #333; }
        
        /* Estilo do botão de música */
        #btnMusica {
            position: fixed; bottom: 20px; right: 20px; background: #1e4d8c; color: white;
            border: 2px solid white; padding: 10px 20px; border-radius: 30px; cursor: pointer;
            z-index: 1000; font-family: 'Poppins', sans-serif; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        #btnMusica:hover { background: #2a66ff; }
    </style>
</head>
<body>

<audio id="musicaFundo" loop>
    <source src="travel.mp3" type="audio/mpeg">
</audio>
<button id="btnMusica" onclick="toggleMusica()">🎵 Música: <span id="estado">OFF</span></button>

<nav>
    <a href="index.html"><img src="https://i.imgur.com/X1xT7Fx.png" class="logo"></a>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="sobre.html">Sobre Mim</a></li>
        <li><a href="passeios.html">Passeios</a></li>
        <li><a href="contatos.html">Contatos</a></li>
    </ul>
</nav>

<main>
    <section>
        <div class="banner"><h1>Bem-vindo aos Passeios do Miguel</h1></div>
        
        <div class="intro-text">
            <p>Descubra Portugal connosco. Experiências únicas, paisagens inesquecíveis e boa companhia.</p>
        </div>

        <div class="container-video-index">
            <iframe width="100%" height="500" 
                src="https://www.youtube.com/embed/7uOx4BxH0rk" 
                title="YouTube video player" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen>
            </iframe>
        </div>
    </section>
</main>

<footer>
    <div class="footer-container">
        <div class="footer-col">
            <h4>Passeios do Miguel</h4>
            <p>&copy; 2026 - Todos os direitos reservados.</p>
        </div>
        <div class="footer-col">
            <h4>Informações</h4>
            <a href="cancelamento.html">Política de Cancelamento</a>
            <a href="contatos.html">Contactos</a>
        </div>
        <div class="footer-col">
            <h4>Siga-nos</h4>
            <div class="social-icons-footer">
                <a href="https://www.facebook.com/passeiosdomiguel" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/passeiosdomiguel/" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://chat.whatsapp.com/GOsICa89IntAlMqS9ydUzJ" target="_blank"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </div>
</footer>

<script>
    function toggleMusica() {
        var audio = document.getElementById("musicaFundo");
        var estado = document.getElementById("estado");
        if (audio.paused) {
            audio.play();
            estado.innerHTML = "ON";
        } else {
            audio.pause();
            estado.innerHTML = "OFF";
        }
    }
</script>

</body>
</html>
