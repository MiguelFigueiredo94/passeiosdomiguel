<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Passeios do Miguel - Passeios com Alma e Aventura</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Estilo para o vídeo do YouTube no Index */
        .container-video-index { 
            width: 100%; 
            max-width: 1000px; 
            margin: 30px auto; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
            padding-bottom: 56.25%; /* Proporção 16:9 */
            height: 0;
        }
        .container-video-index iframe { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%;
            border: none;
        }
        .intro-text { text-align: center; padding: 20px; font-size: 1.2em; color: #333; }
    </style>
</head>
<body>

<nav id="navbar-principal">
    </nav>

<main>
    <section>
        <div class="banner"><h1>Bem-vindo aos Passeios do Miguel</h1></div>
        
        <div class="intro-text">
            <p>Descubra Portugal connosco. Experiências únicas, paisagens inesquecíveis e boa companhia.</p>
        </div>

        <div class="container-video-index">
            <iframe 
                src="https://www.youtube.com/embed/7uOx4BxH0rk?autoplay=1&mute=1&loop=1&playlist=7uOx4BxH0rk" 
                title="YouTube video player" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
    </section>
</main>

<footer>
    <div class="footer-container">
        <div class="footer-col">
            <h4>Passeios do Miguel</h4>
            <p>&copy; 2026 - Todos os direitos reservados.</p>
        </div>
        <div class="footer-col">
            <h4>Informações</h4>
            <a href="cancelamento.html">Política de Cancelamento</a>
            <a href="contatos.html">Contactos</a>
        </div>
        <div class="footer-col">
            <h4>Siga-nos</h4>
            <div class="social-icons-footer">
                <a href="https://www.facebook.com/passeiosdomiguel" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/passeiosdomiguel/" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://chat.whatsapp.com/GOsICa89IntAlMqS9ydUzJ" target="_blank"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </div>
</footer>

<script>
    /* Script para carregar o menu lateral dinâmico */
    document.addEventListener("DOMContentLoaded", function() {
        fetch('menu.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-principal').innerHTML = data;
            })
            .catch(error => console.error('Erro ao carregar o menu:', error));
    });
</script>

</body>
</html>
