<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passeios do Miguel - Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <nav id="navbar-principal"></nav>

    <main>
        <section class="banner">
            <h1>Bem-vindo aos Passeios do Miguel</h1>
        </section>

        <section>
            <h2>Próximos Passeios</h2>
            <div class="container-passeios">
                <div class="card-passeio">
                    <img src="https://i.imgur.com/8N3Z3XG.jpg" alt="Festas do Povo">
                    <h3>Festas do Povo</h3>
                    <p>Campo Maior - Agosto 2026</p>
                    <a href="campomaior.html" class="btn-detalhes">Ver Detalhes</a>
                </div>

                <div class="card-passeio">
                    <img src="https://i.imgur.com/XyZ1234.jpg" alt="Rota da Cereja">
                    <h3>Rota da Cereja</h3>
                    <p>Resende - Junho 2026</p>
                    <a href="cereja.html" class="btn-detalhes">Ver Detalhes</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-col">
                <h4>Contatos</h4>
                <p><i class="fas fa-phone"></i> +351 9xx xxx xxx</p>
                <p><i class="fas fa-envelope"></i> info@passeiosdomiguel.com</p>
            </div>
            <div class="footer-col">
                <h4>Siga-nos</h4>
                <div class="social-icons-footer">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <button id="btnMusica">🎵 Ligar Música</button>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetch('menu.html')
                .then(response => {
                    if (!response.ok) throw new Error("Erro ao carregar menu.html");
                    return response.text();
                })
                .then(data => {
                    document.getElementById('navbar-principal').innerHTML = data;
                })
                .catch(error => console.error('Erro no menu:', error));
        });
    </script>

</body>
</html>
