<!DOCTYPE html>
<html lang="pt">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G0BKTCRNV9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-G0BKTCRNV9');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos - Passeios do Miguel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 1. RESET E ESTRUTURA GLOBAL (Igual ao Index) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f4f7f9; 
            min-height: 100vh;
            display: block; 
        }

        /* 2. ESPAÇO PARA O MENU */
        #menu-placeholder {
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100vh;
            z-index: 1000;
        }
        /* 3. CONTEÚDO PRINCIPAL (Com a margem correta) */
        main { 
            display: flex; 
            flex-direction: column; 
            min-width: 0; 
            margin-left: 250px; 
        }

        /* 4. BANNER HERO (Medidas do Index) */
        .banner-contatos {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1534536281715-e28d76689b4d?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; 
            background-position: center; 
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            border-bottom: 5px solid #ff8c00;
        }
        .banner-contatos h1 { font-size: 3.2em; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); margin: 0; }

        /* SECCÃO DE CONTEÚDO */
        .seccao-branca { padding: 60px 20px; flex-grow: 1; }
        .container-contatos { max-width: 1100px; margin: 0 auto; width: 100%; }

        /* GRID DE CONTACTOS */
        .grid-contatos { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
            margin-bottom: 60px; 
        }

        .card-contato { 
            background: #fff; 
            padding: 45px 20px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid #eee;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .card-contato:hover { transform: translateY(-7px); border-color: #1e4d8c; }
        
        .card-contato i { font-size: 40px; color: #ff8c00; margin-bottom: 20px; }
        .card-contato strong { color: #1e4d8c; font-size: 1.2em; display: block; margin-bottom: 10px; }
        .card-contato p, .card-contato a { color: #444; font-size: 1.05em; text-decoration: none; }
        .card-contato a { font-weight: bold; color: #1e4d8c; transition: 0.3s; }
        .card-contato a:hover { color: #ff8c00; }

        /* FORMULÁRIO */
        .form-container { 
            background: #fff; 
            padding: 45px; 
            border-radius: 25px; 
            max-width: 700px; 
            margin: 0 auto 60px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #eef0f2;
        }
        .form-container h2 { text-align: center; color: #1e4d8c; margin-bottom: 30px; }
        .grupo-input { margin-bottom: 20px; }
        .form-container input, .form-container textarea { 
            width: 100%; padding: 18px; border: 2px solid #e1e5e9; border-radius: 12px; font-size: 1em; outline: none;
        }
        .form-container input:focus, .form-container textarea:focus { border-color: #ff8c00; }
        .form-container button { 
            background: #1e4d8c; color: white; padding: 18px; border: none; border-radius: 12px; 
            width: 100%; font-weight: bold; font-size: 1.2em; cursor: pointer; transition: 0.3s;
        }
        .form-container button:hover { background: #ff8c00; }

        /* RESPONSIVIDADE */
        @media (max-width: 1024px) {
                #menu-placeholder {
                position: relative;
                width: 100%;
                height: auto;
            }
        
            main {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

    <div id="menu-placeholder"></div>

    <main>
        <div class="banner-contatos">
            <h1>Entre em Contacto</h1>
        </div>

        <section class="seccao-branca">
            <div class="container-contatos">
                <div class="grid-contatos">
                    <div class="card-contato">
                        <i class="fas fa-user-tie"></i>
                        <strong>Organizador</strong>
                        <p>Miguel Figueiredo</p>
                    </div>
                    <div class="card-contato">
                        <i class="fab fa-whatsapp"></i>
                        <strong>WhatsApp</strong>
                        <p><a href="https://wa.me/351965715465" target="_blank">+351 965 715 465</a></p>
                    </div>
                    <div class="card-contato">
                        <i class="fas fa-envelope-open-text"></i>
                        <strong>E-mail</strong>
                        <p><a href="mailto:geral@passeiosdomiguel.com">geral@passeiosdomiguel.com</a></p>
                    </div>
                </div>

                <div class="form-container">
                    <h2>Envie-nos uma mensagem</h2>
                    <form action="https://formspree.io/f/mdawddar" method="POST">
                        <div class="grupo-input"><input type="text" name="nome" placeholder="O seu nome completo" required></div>
                        <div class="grupo-input"><input type="email" name="email" placeholder="O seu endereço de e-mail" required></div>
                        <div class="grupo-input"><textarea name="mensagem" rows="6" placeholder="Como podemos ajudar no seu próximo passeio?" required></textarea></div>
                        <button type="submit">Enviar Mensagem Agora</button>
                    </form>
                </div>
            </div>
        </section>
        
        <div id="footer-placeholder"></div> 
    </main>

    <script>
        function carregarComponente(id, ficheiro) {
            fetch(ficheiro)
                .then(response => response.text())
                .then(data => { document.getElementById(id).innerHTML = data; })
                .catch(error => console.error('Erro:', error));
        }

        carregarComponente('menu-placeholder', 'menu.html');
        carregarComponente('footer-placeholder', 'rodape.html');
    </script>
</body>
</html>
