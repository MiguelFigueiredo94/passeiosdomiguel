<!DOCTYPE html>
<html lang="pt">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G0BKTCRNV9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-G0BKTCRNV9');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Memórias - Passeios do Miguel</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/css/glightbox.min.css">
    
    <style>
        /* Base e Layout Lateral (Igual às outras páginas) */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background-color: #f8f9fa; min-height: 100vh; }
        
        #menu-placeholder {
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100vh;
            z-index: 1000;
        }
        
        main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; margin-left: 250px; }

        /* BANNER (Estilo Premium da Política) */
        .gallery-header {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1542332213-9b5a5a3fab35?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center; color: white;
            padding: 80px 20px; text-align: center; border-radius: 0 0 50px 0;
        }
        .gallery-header h1 { font-size: 2.8em; margin-bottom: 10px; font-weight: 800; }

        /* FILTROS */
        .filter-container { 
            padding: 25px; display: flex; justify-content: center; gap: 12px; 
            background: white; position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); flex-wrap: wrap;
        }
        .filter-btn { 
            padding: 10px 25px; border: 2px solid #1e4d8c; background: transparent; 
            color: #1e4d8c; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; 
        }
        .filter-btn.active { background: #1e4d8c; color: white; }

        /* GRID DA GALERIA */
        .gallery-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; padding: 40px 20px; max-width: 1400px; margin: 0 auto; width: 100%;
        }
        .grid-year-title { 
            grid-column: 1 / -1; color: #1e4d8c; font-size: 2.2em; 
            margin-top: 30px; border-left: 6px solid #ff8c00; padding-left: 18px; font-weight: 800; 
        }

        .gallery-item { 
            position: relative; border-radius: 15px; overflow: hidden; height: 260px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); cursor: pointer; transition: 0.4s ease; background: #ddd; 
        }
        .gallery-item:hover { transform: translateY(-8px); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        
        .item-overlay { 
            position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; 
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: white; 
        }
        .photo-count { 
            position: absolute; top: 15px; left: 15px; background: rgba(255,140,0,0.95); 
            color: white; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; z-index: 3; 
        }

        .hidden-photos { display: none; }

        /* Ajustes do Rodapé (Para manter o padrão branco nos títulos) */
        #footer-placeholder h2 { color: #ffffff !important; border-bottom: none !important; margin-top: 0 !important; }

        /* RESPONSIVIDADE (MOBILE) */
        @media (max-width: 1024px) {
            body { display: block; }
            #menu-placeholder { position: relative; width: 100%; height: auto; }
            main { margin-left: 0; }
            .gallery-header { padding: 60px 20px; border-radius: 0 0 30px 0; }
            .gallery-header h1 { font-size: 2em; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="menu-placeholder"></div>

    <main>
        <header class="gallery-header">
            <h1>Galeria de Memórias</h1>
            <p>Reviva os melhores momentos dos nossos passeios.</p>
        </header>

        <div class="filter-container">
            <button class="filter-btn active" onclick="filterGallery('all')">Todos</button>
            <button class="filter-btn" onclick="filterGallery('2026')">2026</button>
            <button class="filter-btn" onclick="filterGallery('2025')">2025</button>
        </div>

        <div class="gallery-grid" id="gallery-grid">
            <h2 class="grid-year-title" data-year="2026">2026</h2>
            
            <div class="gallery-item" data-category="2026">
                <a href="https://i.imgur.com/PmjIQux.png" class="glightbox" data-gallery="camelia">
                    <div class="photo-count"><i class="fas fa-camera"></i> +20</div>
                    <img src="https://i.imgur.com/PmjIQux.png">
                    <div class="item-overlay"><h4>Festa das Camélias</h4></div>
                </a>
                <div class="hidden-photos">
                    <a href="https://i.imgur.com/EOkoi7x.png" class="glightbox" data-gallery="camelia"></a>
                </div>
            </div>

            <h2 class="grid-year-title" data-year="2025">2025</h2>
            
            <div class="gallery-item" data-category="2025">
                <a href="https://i.imgur.com/aUixZ0Y.png" class="glightbox" data-gallery="vigo">
                    <div class="photo-count"><i class="fas fa-camera"></i> +56</div>
                    <img src="https://i.imgur.com/aUixZ0Y.png">
                    <div class="item-overlay"><h4>Valência & Vigo</h4></div>
                </a>
            </div>
        </div>

        <div id="footer-placeholder"></div> 
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js"></script>
    <script>
        // 1. CARREGAR MENU E RODAPÉ (Padrão das tuas páginas)
        fetch('menu.html').then(r => r.text()).then(d => document.getElementById('menu-placeholder').innerHTML = d);
        fetch('rodape.html').then(r => r.text()).then(d => document.getElementById('footer-placeholder').innerHTML = d);

        // 2. INICIALIZAR GLIGHTBOX
        const lightbox = GLightbox({ selector: '.glightbox' });

        // 3. FILTRO DA GALERIA
        function filterGallery(year) {
            const items = document.querySelectorAll('.gallery-item');
            const titles = document.querySelectorAll('.grid-year-title');
            const btns = document.querySelectorAll('.filter-btn');

            btns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            items.forEach(item => {
                if (year === 'all' || item.getAttribute('data-category') === year) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });

            titles.forEach(title => {
                if (year === 'all' || title.getAttribute('data-year') === year) {
                    title.style.display = 'block';
                } else {
                    title.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
