<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Teste Menu Cascata</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<nav id="navbar-principal"></nav>

<main>
    <section>
        <h1>Teste de Menu Dinâmico</h1>
        <p>1. Passa o rato em <strong>Passeios</strong>.</p>
        <p>2. Depois passa o rato em <strong>2025</strong>.</p>
    </section>
</main>

<script>
    // Carrega o menu.html automaticamente
    fetch('menu.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('navbar-principal').innerHTML = data;
        });
</script>

</body>
</html>
