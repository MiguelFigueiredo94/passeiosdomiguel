<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passeios do Miguel - Passeios</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 1. ESTRUTURA IDÊNTICA À TUA HOME */
        body {
            margin: 0;
            padding: 0;
            display: flex; /* Alinha o menu e o conteúdo lado a lado */
            background-color: #f4f7f6;
            font-family: 'Poppins', sans-serif;
        }

        /* Este bloco principal TEM de ter a margem que empurra o texto para fora do menu */
        main {
            flex: 1;
            margin-left: 260px; /* VALOR CRÍTICO: Ajusta para a largura exata da tua barra azul */
            padding: 40px;
            box-sizing: border-box;
        }

        /* 2. BANNER COM CANTOS ARREDONDADOS (IGUAL À TUA IMAGEM) */
        .banner-index {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 80px 20px;
            border-radius: 20px; /* Cantos arredondados como na foto */
            text-align: center;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .banner-index h1 { font-size: 2.8em; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .banner-index p { font-size: 1.2em; margin-top: 10px; }

        /* 3. GRID DE PASSEIOS */
        .titulo-seccao {
            color: #1e4d8c;
            font-size: 1.8em;
            margin: 30px 0;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grid-passeios {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            border: 1px solid #eee;
        }

        .card-img { height: 180px; position: relative; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.7em;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }

        .info-card { padding: 20px; text-align: center; flex-grow: 1; }
        .info-card .data { color: #1e4d8c; font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 5px; }
        .info-card h3 { margin: 10px 0; font-size: 1.2em; color: #333; }

        .botoes-card { padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #fafafa; }
        .btn { padding: 10px; border-radius: 8px; text-decoration: none; text-align: center; font-weight: bold; font-size: 0.85em; }
        .btn-itinerario { background: #e1e9f1; color: #1e4d8c; }
        .btn-inscricao { background: #1e4d8c; color: white; }
        .btn-whats { background: #2ecc71; color: white; }
        .row-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        /* 4. RODAPÉ */
        footer {
            margin-left: 260px; /* Tem de ser igual à margem do main */
            background: #1e4d8c;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="menu-placeholder"></div>

    <main>
        <div class="banner-index">
            <h1>Os Nossos Passeios</h1>
            <p>Descubra Portugal connosco. Experiências únicas e boa companhia.</p>
        </div>

        <h2 class="titulo-seccao"><i class="fas fa-bus"></i> Inscrições Abertas</h2>

        <div class="grid-passeios">
            <article class="card">
                <div class="card-img">
                    <span class="badge" style="background: #2ecc71;">Aberto</span>
                    <img src="https://osmeustrilhos.pt/wp-content/uploads/2015/08/festas-do-povo-campo-maior-2.jpg" alt="Campo Maior">
                </div>
                <div class="info-card">
                    <span class="data">Agosto 2026</span>
                    <h3>Festas do Povo</h3>
                    <p style="color: #777; font-size: 0.9em;">(Campo Maior)</p>
                </div>
                <div class="botoes-card">
                    <a href="campomaior.html" class="btn btn-itinerario">Ver Itinerário</a>
                    <div class="row-btns">
                        <a href="inscricao.html" class="btn btn-inscricao">Inscrição</a>
                        <a href="https://wa.me/351965715476" class="btn btn-whats"><i class="fab fa-whatsapp"></i> Chat</a>
                    </div>
                </div>
            </article>

            </div>
    </main>

    <footer>
        <p>&copy; 2026 Passeios do Miguel - Todos os direitos reservados.</p>
    </footer>

    <script>
        // Carrega o menu e garante que o FAQ funciona
        fetch('menu.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('menu-placeholder').innerHTML = data;
                
                // Ativação do Modal FAQ
                const btn = document.getElementById('botaoDuvidas');
                const modal = document.getElementById('janelaFaq');
                const fechar = document.getElementById('fecharFaq');

                if(btn && modal) {
                    btn.onclick = () => modal.style.display = "block";
                    fechar.onclick = () => modal.style.display = "none";
                }
            });
    </script>
</body>
</html>
