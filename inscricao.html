<!DOCTYPE html>
<html lang="pt">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G0BKTCRNV9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-G0BKTCRNV9');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Passeios do Miguel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 1. RESET E ESTRUTURA LATERAL */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; background-color: #f0f2f5; min-height: 100vh; }
        
        #menu-placeholder { 
            width: 250px; 
            flex-shrink: 0; 
            position: sticky; 
            top: 0; 
            height: 100vh; 
            background-color: #1e4d8c; 
        }

        main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }

        /* 2. BANNER PADRONIZADO (Consistente com as outras páginas) */
        .banner-inscricao {
            background: linear-gradient(rgba(30, 77, 140, 0.85), rgba(30, 77, 140, 0.85)), 
                        url('https://images.unsplash.com/photo-1527631746610-bca00a040d60?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center; color: white;
            height: 300px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
        }
        .banner-inscricao h1 { font-size: 2.8em; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.2); }

        /* 3. FORMULÁRIO */
        .seccao-form { padding: 40px 20px; flex-grow: 1; }
        .container-form { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h2 { color: #1e4d8c; font-size: 1.5em; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        h2 i { color: #ff8c00; }

        .campo-grupo { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; font-size: 0.95em; }
        
        input, select {
            width: 100%; padding: 14px; border: 2px solid #e1e5e9; border-radius: 12px;
            box-sizing: border-box; font-size: 1em; transition: 0.3s; background: #fdfdfd;
        }
        input:focus, select:focus { border-color: #1e4d8c; outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(30, 77, 140, 0.1); }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* 4. ACOMPANHANTES (DINÂMICO) */
        .card-extra {
            background: #f8f9fa; padding: 25px; border-radius: 20px; 
            margin-top: 20px; border: 1px dashed #aac6ff;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 5. BOTÃO */
        .btn-enviar {
            background: #1e4d8c; color: white; padding: 20px; border: none; border-radius: 15px;
            width: 100%; font-weight: bold; font-size: 1.2em; cursor: pointer; margin-top: 30px;
            transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-enviar:hover { background: #ff8c00; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 140, 0, 0.3); }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            #menu-placeholder { width: 100%; height: auto; position: relative; }
            .grid-inputs { grid-template-columns: 1fr; }
            .container-form { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="menu-placeholder"></div>

    <main>
        <div class="banner-inscricao">
            <h1>Reserva de Lugar</h1>
            <p>Preencha os dados abaixo para garantir a sua viagem.</p>
        </div>

        <section class="seccao-form">
            <div class="container-form">
                <form action="https://formspree.io/f/manjdnbw" method="POST">
                    
                    <h2><i class="fas fa-user-circle"></i> Dados Pessoais do Viajante</h2>
                    
                    <div class="campo-grupo">
                        <label>Nome Completo</label>
                        <input type="text" name="nomeResponsavel" placeholder="Ex: Maria Silva" required>
                    </div>

                    <div class="grid-inputs">
                        <div class="campo-grupo">
                            <label>Telemóvel</label>
                            <input type="tel" name="contactoResponsavel" placeholder="9xx xxx xxx" required>
                        </div>
                        <div class="campo-grupo">
                            <label>Data de Nascimento</label>
                            <input type="date" name="nascimentoResponsavel" required>
                        </div>
                    </div>

                    <div class="campo-grupo">
                        <label>Localidade</label>
                        <input type="text" name="localidadeResponsavel" placeholder="Onde reside?" required>
                    </div>

                    <hr style="border: 0; border-top: 1px solid #eee; margin: 40px 0;">

                    <h2><i class="fas fa-bus"></i> Detalhes da Viagem</h2>

                    <div class="campo-grupo">
                        <label>Escolha o Passeio</label>
                        <select id="passeioEscolhido" name="Passeio" required>
                            <option value="">Selecione um passeio...</option>
                            <option value="Festa das Camélias">Festa das Camélias</option>
                            <option value="Magia Animal Gaia">Magia Animal em Gaia</option>
                            <option value="Rota da Cereja">Rota da Cereja</option>
                            <option value="Festa das Cruzes">Festa das Cruzes</option>
                            <option value="Festas do Povo de Campo Maior">Festas do Povo de Campo Maior</option>
                        </select>
                    </div>

                    <div class="campo-grupo">
                        <label>Quantos acompanhantes leva consigo?</label>
                        <select id="numPessoas" name="quantidade_acompanhantes" onchange="gerarCampos()">
                            <option value="0">Vou sozinho(a)</option>
                            <option value="1">1 Acompanhante</option>
                            <option value="2">2 Acompanhantes</option>
                            <option value="3">3 Acompanhantes</option>
                            <option value="4">4 Acompanhantes</option>
                            <option value="5">5 Acompanhantes</option>
                        </select>
                    </div>

                    <div id="camposDinamicos"></div>

                    <button type="submit" class="btn-enviar">
                        Confirmar Inscrição <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </section>

        <div id="footer-placeholder"></div>
    </main>

    <script>
        // 1. Carregar Menu e Rodapé
        function carregarComponente(id, ficheiro) {
            fetch(ficheiro)
                .then(res => res.text())
                .then(data => document.getElementById(id).innerHTML = data)
                .catch(err => console.error("Erro ao carregar:", ficheiro));
        }

        carregarComponente('menu-placeholder', 'menu.html');
        carregarComponente('footer-placeholder', 'rodape.html');

        // 2. Preencher passeio via URL
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const passeio = params.get('passeio');
            if(passeio) {
                // Remove os "+" e substitui por espaços para coincidir com o "value" do select
                const nomeFormatado = passeio.replace(/\+/g, ' ');
                document.getElementById('passeioEscolhido').value = nomeFormatado;
            }
        };

        // 3. Gerar campos para acompanhantes
        function gerarCampos() {
            const qtd = document.getElementById('numPessoas').value;
            const container = document.getElementById('camposDinamicos');
            container.innerHTML = '';
            
            for(let i=1; i<=qtd; i++) {
                container.innerHTML += `
                <div class="card-extra">
                    <h3 style="color:#1e4d8c; margin-top:0; font-size:1.1em; margin-bottom:15px;">
                        <i class="fas fa-user-plus"></i> Acompanhante ${i}
                    </h3>
                    <div class="campo-grupo">
                        <input type="text" name="nomeExtra${i}" placeholder="Nome Completo" required>
                    </div>
                    <div class="grid-inputs">
                        <input type="date" name="nascExtra${i}" required>
                        <input type="tel" name="telExtra${i}" placeholder="Contacto (Opcional)">
                    </div>
                </div>`;
            }
        }

        // 4. Suporte para o FAQ do menu
        document.addEventListener('click', function (e) {
            if (e.target && (e.target.id === 'botaoDuvidas' || e.target.closest('#botaoDuvidas'))) {
                document.getElementById('janelaFaq').style.display = 'block';
            }
            if (e.target && (e.target.id === 'fecharFaq' || e.target.id === 'janelaFaq')) {
                document.getElementById('janelaFaq').style.display = 'none';
            }
        });
    </script>
</body>
</html>
