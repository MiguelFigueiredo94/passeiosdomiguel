<!DOCTYPE html>
<html lang="pt">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G0BKTCRNV9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-G0BKTCRNV9');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Passeios do Miguel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 1. RESET E ESTRUTURA */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f4f7f9; 
            min-height: 100vh;
            display: block; 
        }

        #menu-placeholder {
                position: fixed;
                top: 0;
                left: 0;
                width: 250px;
                height: 100vh;
                z-index: 1000;
            }

        main { 
            display: flex; 
            flex-direction: column; 
            min-width: 0; 
            margin-left: 250px; 
        }

        /* 2. CABEÇALHO HERO (IGUAL À HOME E SOBRE) */
        .hero-section {
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                              url('https://images.unsplash.com/photo-1527631746610-bca00a040d60?q=80&w=1200');
            background-size: cover; 
            background-position: center; 
            height: 380px; /* Altura Padronizada */
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            color: white; 
            text-align: center; 
            border-bottom: 5px solid #ff8c00; /* Linha Laranja */
        }
        .hero-section h1 { 
            font-size: 3.2em; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5); 
            margin-bottom: 10px;
            color: white !important;
        }
        .hero-section p { 
            font-size: 1.3em; 
            max-width: 700px; 
            font-weight: 300; 
            padding: 0 20px; 
        }

        /* 3. CONTEÚDO DO FORMULÁRIO */
        .seccao-form { padding: 60px 20px; flex-grow: 1; }
        .container-form { 
            max-width: 850px; 
            margin: 0 auto; 
            background: white; 
            padding: 45px; 
            border-radius: 20px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.07);
        }

        h2 { 
            color: #1e4d8c; 
            font-size: 1.6em; 
            margin-bottom: 30px; 
            display: flex; 
            align-items: center; 
            gap: 12px;
        }
        h2 i { color: #ff8c00; }

        .campo-grupo { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: #334155; font-size: 0.95em; }
        
        input, select {
            width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 14px;
            box-sizing: border-box; font-size: 1em; transition: 0.3s; background: #fcfdfe;
        }
        input:focus, select:focus { 
            border-color: #1e4d8c; outline: none; background: #fff; 
            box-shadow: 0 0 0 4px rgba(30, 77, 140, 0.08); 
        }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .card-extra {
            background: #f8fafc; padding: 30px; border-radius: 20px; 
            margin-top: 25px; border: 1px dashed #cbd5e1;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-enviar {
            background: #1e4d8c; color: white; padding: 22px; border: none; border-radius: 18px;
            width: 100%; font-weight: bold; font-size: 1.25em; cursor: pointer; margin-top: 40px;
            transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .btn-enviar:hover { background: #ff8c00; transform: translateY(-3px); }

        /* 4. RODAPÉ (FORCE WHITE) */
        #footer-placeholder { width: 100%; }
        #footer-placeholder footer, 
        #footer-placeholder p, 
        #footer-placeholder h1, #footer-placeholder h2, #footer-placeholder h3, 
        #footer-placeholder a, #footer-placeholder span, #footer-placeholder i { 
            color: #ffffff !important; 
        }

        /* 5. RESPONSIVIDADE */
        @media (max-width: 1024px) {
            main { margin-left: 0; } /* <--- ISTO É O QUE CORRIGE TUDO */
            .features-grid { grid-template-columns: 1fr; }
            .hero-section h1 { font-size: 2.2em; }
        }
    </style>
</head>
<body>

    <div id="menu-placeholder"></div>

    <main>
        <section class="hero-section">
            <h1>Reserva de Lugar</h1>
            <p>Garanta a sua presença na nossa próxima aventura.</p>
        </section>

        <section class="seccao-form">
            <div class="container-form">
                <form action="https://formspree.io/f/manjdnbw" method="POST">
                    
                    <h2><i class="fas fa-user-circle"></i> Dados do Viajante</h2>
                    
                    <div class="campo-grupo">
                        <label>Nome Completo</label>
                        <input type="text" name="nomeResponsavel" placeholder="Como no cartão de cidadão" required>
                    </div>

                    <div class="grid-inputs">
                        <div class="campo-grupo">
                            <label>Telemóvel</label>
                            <input type="tel" name="contactoResponsavel" placeholder="9xx xxx xxx" required>
                        </div>
                        <div class="campo-grupo">
                            <label>Data de Nascimento</label>
                            <input type="date" name="nascimentoResponsavel" required>
                        </div>
                    </div>

                    <div class="campo-grupo">
                        <label>Localidade</label>
                        <input type="text" name="localidadeResponsavel" placeholder="Ex: São Pedro do Sul" required>
                    </div>

                    <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 40px 0;">

                    <h2><i class="fas fa-bus"></i> Detalhes da Viagem</h2>

                    <div class="campo-grupo">
                        <label>Escolha o Passeio</label>
                        <select id="passeioEscolhido" name="Passeio" required>
                            <option value="">Selecione um destino...</option>
                            <option value="Rota da Cereja">Rota da Cereja</option>
                            <option value="Festa das Cruzes">Festa das Cruzes</option>
                            <option value="Festas do Povo de Campo Maior">Festas do Povo de Campo Maior</option>
                        </select>
                    </div>

                    <div class="campo-grupo">
                        <label>Número de Acompanhantes</label>
                        <select id="numPessoas" onchange="gerarCampos()">
                            <option value="0">Vou sozinho(a)</option>
                            <option value="1">1 Acompanhante</option>
                            <option value="2">2 Acompanhantes</option>
                            <option value="3">3 Acompanhantes</option>
                            <option value="4">4 Acompanhantes</option>
                            <option value="5">5 Acompanhantes</option>
                        </select>
                    </div>

                    <div id="camposDinamicos"></div>

                    <button type="submit" class="btn-enviar">
                        Confirmar Inscrição <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </section>

        <div id="footer-placeholder"></div>
    </main>

    <script>
        function carregarComponente(id, ficheiro) {
            fetch(ficheiro)
                .then(res => res.text())
                .then(data => document.getElementById(id).innerHTML = data)
                .catch(err => console.error("Erro ao carregar:", ficheiro));
        }

        carregarComponente('menu-placeholder', 'menu.html');
        carregarComponente('footer-placeholder', 'rodape.html');

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const passeio = params.get('passeio');
            if(passeio) document.getElementById('passeioEscolhido').value = passeio.replace(/\+/g, ' ');
        };

        function gerarCampos() {
            const qtd = document.getElementById('numPessoas').value;
            const container = document.getElementById('camposDinamicos');
            container.innerHTML = '';
            
            for(let i=1; i<=qtd; i++) {
                container.innerHTML += `
                <div class="card-extra">
                    <h3 style="color:#1e4d8c; margin-bottom:20px; font-size:1.1em;"><i class="fas fa-user-plus" style="color:#ff8c00"></i> Acompanhante ${i}</h3>
                    <div class="campo-grupo">
                        <input type="text" name="nomeExtra${i}" placeholder="Nome Completo" required>
                    </div>
                    <div class="grid-inputs">
                        <input type="date" name="nascExtra${i}" required>
                        <input type="tel" name="telExtra${i}" placeholder="Telemóvel (Opcional)">
                    </div>
                </div>`;
            }
        }
    </script>
</body>
</html>
